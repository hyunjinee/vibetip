<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VibeTip 데모 — 카카오페이로 후원받기</title>
  <style>
    :root {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", Pretendard, "Noto Sans KR", sans-serif;
      color: #191f28;
      background: #f4f6f8;
      text-rendering: optimizeLegibility;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at 12% 8%, rgb(255 221 0 / 24%), transparent 30rem),
        #f4f6f8;
    }
    button, a { font: inherit; }
    .app-shell {
      width: min(100% - 40px, 880px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 88px 0 64px;
    }
    .intro { max-width: 680px; }
    .eyebrow {
      display: inline-flex;
      padding: 6px 10px;
      border-radius: 999px;
      background: #ffdd00;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .intro h1 {
      margin: 20px 0 14px;
      font-size: clamp(38px, 6vw, 64px);
      line-height: 1.14;
      letter-spacing: -0.045em;
    }
    .intro h1 span {
      text-decoration: underline;
      text-decoration-color: #ffdd00;
      text-decoration-thickness: 0.22em;
      text-underline-offset: -0.08em;
      text-decoration-skip-ink: none;
    }
    .intro p { margin: 0; color: #4e5968; font-size: 18px; }
    .support-card {
      margin-top: 48px;
      padding: 20px;
      border: 1px solid rgb(2 32 71 / 8%);
      border-radius: 32px;
      background: rgb(255 255 255 / 88%);
      box-shadow: 0 24px 70px rgb(25 31 40 / 12%);
      backdrop-filter: blur(18px);
    }
    .desktop-qr {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 36px;
    }
    .qr-frame {
      display: grid;
      place-items: center;
      padding: 14px;
      border: 1px solid rgb(2 32 71 / 8%);
      border-radius: 24px;
      background: #fff;
      box-shadow: 0 10px 30px rgb(25 31 40 / 8%);
    }
    .qr-frame svg { display: block; width: 208px; height: 208px; }
    .device-badge {
      display: inline-flex;
      margin-bottom: 12px;
      padding: 5px 9px;
      border-radius: 8px;
      background: #f2f4f6;
      color: #4e5968;
      font-size: 12px;
      font-weight: 700;
    }
    .qr-copy h2, .mobile-pay h2 {
      margin: 0;
      font-size: 26px;
      line-height: 1.3;
      letter-spacing: -0.035em;
    }
    .qr-copy p, .mobile-pay p {
      max-width: 390px;
      margin: 12px 0 0;
      color: #6b7684;
      font-size: 15px;
      line-height: 1.65;
      word-break: keep-all;
    }
    .mobile-pay { display: none; }
    .pay-button {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 58px;
      margin-top: 24px;
      padding: 0 20px;
      border-radius: 18px;
      background: #ffdd00;
      color: #191f28;
      font-weight: 800;
      text-decoration: none;
      box-shadow: 0 10px 24px rgb(255 221 0 / 28%);
    }
    .pay-button .arrow { margin-left: auto; font-size: 20px; }
    .kakaopay-mark { width: 26px; height: 26px; flex: none; }
    .widget-trigger {
      margin-top: 20px;
      padding: 10px 14px;
      border: 0;
      border-radius: 12px;
      background: transparent;
      color: #8b95a1;
      font-size: 13px;
      cursor: pointer;
    }
    .widget-trigger:hover { background: rgb(25 31 40 / 5%); color: #4e5968; }
    @media (max-width: 640px) {
      body {
        background:
          radial-gradient(circle at 20% 0%, rgb(255 221 0 / 30%), transparent 24rem),
          #f4f6f8;
      }
      .app-shell { width: min(100% - 32px, 480px); padding: 56px 0 108px; }
      .intro h1 { margin-top: 16px; font-size: clamp(34px, 11vw, 48px); }
      .intro p { font-size: 16px; line-height: 1.65; }
      .support-card { margin-top: 36px; padding: 24px; border-radius: 26px; }
      .desktop-qr { display: none; }
      .mobile-pay { display: block; }
      .mobile-pay h2 { font-size: 24px; }
      .widget-trigger { display: block; margin: 16px auto 0; }
    }
    @media (prefers-reduced-motion: no-preference) {
      .pay-button, .widget-trigger {
        transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease, color 160ms ease;
      }
      .pay-button:hover { transform: translateY(-2px); box-shadow: 0 14px 30px rgb(255 221 0 / 36%); }
    }
  </style>
</head>

    <button class="widget-trigger" id="open-tip">VibeTip 패널 열기</button>
  </main>

  <!-- 위젯 본체. 로컬에서는 `bun run build` 후 ../dist 가 생깁니다. 실제 사이트에선 CDN(https://cdn.jsdelivr.net/npm/vibetip@0/dist/vibetip.iife.js)을 쓰세요. -->
  <script src="../dist/vibetip.iife.js"></script>
  <script>
    const tip = VibeTip.init({
      name: 'VibeTip',
      message: '모바일에서는 바로 송금하고, PC에서는 화면의 QR을 스캔해 주세요.',
      links: ['https://qr.kakaopay.com/Ej8TSKM4J'], // ← 본인 카카오페이 송금코드 URL로 바꾸세요
      accent: '#FFDD00',
      position: 'bottom-right',
      theme: 'auto',
    })
    document.getElementById('open-tip').addEventListener('click', (e) => {
      e.stopPropagation()
      tip.open()
    })
  </script>
</body>
</html>
