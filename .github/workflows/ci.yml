name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      # build = tsc --noEmit && bun run build.ts && tsc --emitDeclarationOnly
      - run: bun run build

      - name: Pack tarball for example smoke tests
        run: bun pm pack

      - uses: actions/upload-artifact@v4
        with:
          name: vibetip-tarball
          path: vibetip-*.tgz

  examples:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example: [react-vite, nextjs]
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/download-artifact@v4
        with:
          name: vibetip-tarball

      - name: Install deps
        working-directory: examples/${{ matrix.example }}
        run: bun install

      # Overlay the HEAD build so CI validates examples against this commit,
      # not just the published registry version.
      - name: Use HEAD tarball instead of registry vibetip
        working-directory: examples/${{ matrix.example }}
        run: bun add "$(ls "$GITHUB_WORKSPACE"/vibetip-*.tgz)"

      - name: Build
        working-directory: examples/${{ matrix.example }}
        run: bun run build
