name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned: `latest` once shipped a broken IIFE bundle (0.3.0). Bump
          # deliberately after verifying `bun run build` still passes its guard.
          bun-version: 1.3.5

      - run: bun install --frozen-lockfile

      # build = tsc --noEmit && bun run build.ts && tsc --emitDeclarationOnly
      - run: bun run build
