name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write        # push version commit + tags, create GitHub Releases
  pull-requests: write   # open/update the Version Packages PR
  id-token: write        # npm OIDC trusted publishing (+ automatic provenance)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Bun for install + build
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      # Node + modern npm for the publish step. `changeset publish` shells out
      # to `npm publish` (changesets only special-cases pnpm), and npm >= 11.5.1
      # is what performs OIDC trusted publishing with automatic provenance.
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - run: npm install -g npm@latest

      - name: Create Release PR or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          # version PR also re-points examples/*/package.json at the new version
          version: bun run version-packages
          publish: bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
