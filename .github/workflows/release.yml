name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write        # push version commit + tags, create GitHub Releases
  pull-requests: write   # open/update the Version Packages PR
  id-token: write        # npm OIDC trusted publishing (+ automatic provenance)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      # OIDC trusted publishing needs npm >= 11.5.1
      - run: npm install -g npm@latest

      - run: npm ci

      - name: Create Release PR or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          # version PR also re-points examples/*/package.json at the new version
          version: npm run version-packages
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
