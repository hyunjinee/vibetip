<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VibeTip — 바닐라 예제</title>
  <style>
:root {
  font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", Pretendard, "Noto Sans KR", sans-serif;
  color: #191f28;
  background: #f4f6f8;
  font-synthesis: none;
  text-rendering: optimizeLegibility;
}

* {
  box-sizing: border-box;
}

body {
  min-width: 320px;
  min-height: 100vh;
  margin: 0;
  background:
    radial-gradient(circle at 12% 8%, rgb(255 221 0 / 24%), transparent 30rem),
    #f4f6f8;
}

button,
a {
  font: inherit;
}

.app-shell {
  width: min(100% - 40px, 760px);
  min-height: 100vh;
  margin: 0 auto;
  padding: 96px 0 72px;
  text-align: center;
}

.intro {
  max-width: 640px;
  margin: 0 auto;
}

.eyebrow {
  display: inline-flex;
  padding: 6px 10px;
  border-radius: 999px;
  background: #ffdd00;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.intro h1 {
  margin: 20px 0 14px;
  font-size: clamp(38px, 6vw, 64px);
  line-height: 1.14;
  letter-spacing: -0.045em;
}

.intro h1 span {
  text-decoration: underline;
  text-decoration-color: #ffdd00;
  text-decoration-thickness: 0.22em;
  text-underline-offset: -0.08em;
  text-decoration-skip-ink: none;
}

.intro p {
  margin: 0;
  color: #4e5968;
  font-size: 18px;
}

.cta-wrap {
  display: grid;
  place-items: center;
  gap: 14px;
  margin-top: 56px;
}

.open-panel {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  min-height: 62px;
  padding: 0 34px;
  border: 0;
  border-radius: 18px;
  background: #ffdd00;
  color: #191f28;
  font-size: 18px;
  font-weight: 800;
  cursor: pointer;
  box-shadow: 0 12px 30px rgb(255 221 0 / 36%);
}

.kakaopay-mark {
  width: 26px;
  height: 26px;
  flex: none;
}

.cta-hint {
  margin: 0;
  color: #8b95a1;
  font-size: 14px;
}

@media (max-width: 640px) {
  body {
    background:
      radial-gradient(circle at 20% 0%, rgb(255 221 0 / 30%), transparent 24rem),
      #f4f6f8;
  }

  .app-shell {
    width: min(100% - 32px, 480px);
    padding: 64px 0 96px;
  }

  .intro h1 {
    margin-top: 16px;
    font-size: clamp(34px, 11vw, 48px);
  }

  .intro p {
    font-size: 16px;
    line-height: 1.65;
  }

  .cta-wrap {
    margin-top: 44px;
  }

  .open-panel {
    width: 100%;
  }
}

@media (prefers-reduced-motion: no-preference) {
  .open-panel {
    transition: transform 160ms ease, box-shadow 160ms ease;
  }

  .open-panel:hover {
    transform: translateY(-2px);
    box-shadow: 0 16px 38px rgb(255 221 0 / 44%);
  }
}
  </style>
</head>
<body>
  <main class="app-shell">
    <section class="intro">
      <span class="eyebrow">VibeTip</span>
      <h1>이 앱이 도움이 됐다면<br /><span>커피 한 잔</span> 보내주세요.</h1>
      <p>카카오페이로 간단하고 안전하게 응원할 수 있어요.</p>
    </section>

    <div class="cta-wrap">
      <button class="open-panel" id="open-tip">
        <svg class="kakaopay-mark" viewBox="0 0 34 34" aria-hidden="true"><path d="M17 3.5C9.27 3.5 3 8.51 3 14.7c0 4 2.62 7.5 6.56 9.48l-1.4 4.2c-.17.5.4.9.82.62l5-3.35c.98.18 2 .27 3.02.27 7.73 0 14-5.02 14-11.21C31 8.5 24.73 3.5 17 3.5Z" fill="currentColor"/></svg>
        VibeTip 패널 열기
      </button>
      <p class="cta-hint">PC에서는 QR, 모바일에서는 카카오페이 송금 화면이 열립니다.</p>
    </div>
  </main>

  <!-- 스크립트 한 줄이면 끝. data-links 대신 init()으로 패널 열기 버튼까지 연결한 예시입니다. -->
  <script src="https://cdn.jsdelivr.net/npm/vibetip@0/dist/vibetip.iife.js"></script>
  <script>
    const tip = VibeTip.init({
      name: "VibeTip",
      message: "모바일에서는 바로 송금하고, PC에서는 화면의 QR을 스캔해 주세요.",
      links: ["https://qr.kakaopay.com/Ej8TSKM4J"], // ← 본인 카카오페이 송금코드 URL로 바꾸세요
      accent: "#FFDD00",
      position: "bottom-right",
      theme: "auto",
    });
    document.getElementById("open-tip").addEventListener("click", function (e) {
      e.stopPropagation();
      tip.open();
    });
  </script>
</body>
</html>
