<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VibeTip — 바닐라 예제</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      max-width: 640px;
      margin: 60px auto;
      padding: 0 20px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <h1>☕ 스크립트 태그 한 줄이면 끝</h1>
  <p>이 파일을 브라우저에서 열면 오른쪽 아래에 Tip 버튼이 떠 있습니다. 빌드 도구도, npm도 필요 없습니다.</p>
  <p><code>data-links</code>에 본인의 카카오페이 송금코드 URL을 넣으세요. 모바일에서는 바로 열리고 PC에서는 QR이 표시됩니다.</p>

  <!-- 이 한 줄이 전부입니다. 링크를 본인 것으로 바꾸세요. -->
  <script src="https://cdn.jsdelivr.net/npm/vibetip@0/dist/vibetip.iife.js"
    data-name="홍길동"
    data-message="이 앱이 도움이 됐다면 커피 한 잔!"
    data-links="https://qr.kakaopay.com/your-code"
    data-position="bottom-right"
    data-theme="auto"></script>
</body>
</html>
